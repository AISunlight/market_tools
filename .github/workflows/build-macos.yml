name: Build macOS package

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
          - arch: intel
            runner: macos-13
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate Tauri icons
        run: npm run tauri:icon

      - name: Build macOS app
        run: npm run tauri:build -- --target ${{ matrix.target }}

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          APP_PATH="$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -n "$APP_PATH" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-assets/Market-Tools-${{ matrix.arch }}.app.zip"
          fi
          find "src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -maxdepth 1 -name '*.dmg' -type f -exec cp {} "release-assets/Market-Tools-${{ matrix.arch }}.dmg" \;

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-tools-macos-${{ matrix.arch }}-app
          path: release-assets/Market-Tools-${{ matrix.arch }}.app.zip

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-tools-macos-${{ matrix.arch }}-dmg
          path: release-assets/Market-Tools-${{ matrix.arch }}.dmg

  publish-release:
    name: Publish release assets
    needs: build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten assets
        run: |
          mkdir -p upload
          find release-assets -type f \( -name '*.dmg' -o -name '*.zip' \) -exec cp {} upload/ \;
          ls -la upload

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: build-${{ github.run_number }}
          RELEASE_NAME: Build ${{ github.run_number }} · ${{ github.ref_name }} · ${{ github.sha }}
        run: |
          gh release create "$TAG_NAME" upload/* \
            --target "${{ github.sha }}" \
            --title "$RELEASE_NAME" \
            --notes "Automated macOS build for branch \`${{ github.ref_name }}\` at commit \`${{ github.sha }}\`." \
            --prerelease
