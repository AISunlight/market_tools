name: Build macOS package

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
          - arch: intel
            runner: macos-13
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate Tauri icons
        run: npm run tauri:icon

      - name: Build and publish with Tauri Action
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: build-${{ github.run_number }}
          releaseName: Build ${{ github.run_number }} · ${{ github.ref_name }}
          releaseBody: Automated macOS build for branch `${{ github.ref_name }}` at commit `${{ github.sha }}`.
          releaseCommitish: ${{ github.sha }}
          releaseDraft: false
          prerelease: true
          args: --target ${{ matrix.target }}
          releaseAssetNamePattern: Market-Tools-${{ matrix.arch }}-[bundle].[ext]
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: market-tools-macos-${{ matrix.arch }}-[bundle]
